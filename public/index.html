<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizrr Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #141927;
            --bg-tertiary: #1a2234;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #6366f1;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f97316;
            --border-color: #2d3748;
            --hover-bg: #1e293b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-box {
            background: var(--bg-secondary);
            padding: 48px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin: 0 auto 24px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-primary);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5558e3;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-link {
            color: var(--accent-blue);
            cursor: pointer;
            font-weight: 600;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 90px;
            height: 100vh;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            z-index: 100;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .logo-text {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 32px;
        }

        .nav-item {
            width: 64px;
            height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            position: relative;
        }

        .nav-item:hover {
            background-color: var(--hover-bg);
        }

        .nav-item.active {
            background-color: var(--bg-tertiary);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -18px;
            width: 3px;
            height: 32px;
            background-color: var(--accent-blue);
            border-radius: 0 2px 2px 0;
        }

        .nav-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item.active .nav-label {
            color: var(--text-primary);
        }

        .logout-btn {
            margin-top: auto;
            width: 64px;
            height: 48px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        .test-series-selector {
            width: 64px;
            height: 80px;
            background-color: #10b981;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 4px;
            border: 2px solid #10b981;
            margin-bottom: 24px;
        }

        .test-series-label {
            font-size: 9px;
            font-weight: 700;
            color: white;
            text-align: center;
            line-height: 1.2;
        }

        .main-content {
            margin-left: 90px;
            padding: 32px;
            min-height: 100vh;
        }

        .performance-card {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 24px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-value {
            font-size: 32px;
            font-weight: 700;
        }

        .summary-bar {
            height: 6px;
            background-color: var(--bg-tertiary);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .summary-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .test-table {
            width: 100%;
            background-color: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 16px;
            padding: 18px 24px;
            background-color: var(--bg-tertiary);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .table-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
            gap: 16px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .test-name {
            font-weight: 600;
            font-size: 14px;
        }

        .test-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-max {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .stat-bar {
            height: 48px;
            width: 4px;
            background: linear-gradient(to bottom, var(--color), transparent);
            border-radius: 2px;
            margin-left: 4px;
        }

        .user-info {
            background: var(--bg-tertiary);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .username-display {
            font-weight: 600;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">Q</div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to view your analytics</p>
                
                <div id="loginError" class="error-message hidden"></div>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="loginUsername" required placeholder="Enter username">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="loginPassword" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
                </form>
                
                <div class="auth-switch">
                    Don't have an account? <span class="auth-link" onclick="showRegisterForm()">Sign up</span>
                </div>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Start tracking your performance</p>
                
                <div id="registerError" class="error-message hidden"></div>
                <div id="registerSuccess" class="success-message hidden"></div>
                
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="registerUsername" required placeholder="Choose username">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="registerPassword" required placeholder="••••••••" minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
                </form>
                
                <div class="auth-switch">
                    Already have an account? <span class="auth-link" onclick="showLoginForm()">Sign in</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" class="hidden">
        <div class="sidebar">
            <div class="logo">Q</div>
            <div class="logo-text">Quizrr</div>
            <div class="nav-item active">
                <span class="nav-label">Home</span>
            </div>
            <div class="test-series-selector">
                <div class="test-series-label">JEE Main<br>2026</div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="main-content">
            <div class="user-info">
                <span>Logged in as: <span class="username-display" id="usernameDisplay"></span></span>
            </div>
            
            <div id="dashboardContent">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading your analytics...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kgqxukyytpvmblypuaxw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtncXh1a3l5dHB2bWJseXB1YXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5NTAzNzMsImV4cCI6MjA2MDUyNjM3M30.mOjd7vPXlPo4hGGKiCVG1fHx0sAMXoQEoOPWqF7_dGI';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;

        // Check if user is logged in
        window.addEventListener('DOMContentLoaded', async () => {
            const savedUser = localStorage.getItem('quizrr_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('usernameDisplay').textContent = currentUser.username;
                showDashboard();
                loadUserAttempts();
            }
        });

        function showLoginForm() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegisterForm() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showAuthScreen() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            errorDiv.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                // Query users table
                const { data: users, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('email', username)
                    .eq('password_hash', password)
                    .limit(1);

                if (error) throw error;

                if (!users || users.length === 0) {
                    throw new Error('Invalid username or password');
                }

                currentUser = {
                    id: users[0].id,
                    username: users[0].email,
                    full_name: users[0].full_name
                };

                localStorage.setItem('quizrr_user', JSON.stringify(currentUser));
                document.getElementById('usernameDisplay').textContent = currentUser.username;
                showDashboard();
                loadUserAttempts();
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = error.message || 'Login failed';
                errorDiv.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const registerBtn = document.getElementById('registerBtn');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating...';

            try {
                // Check if username exists
                const { data: existing } = await supabase
                    .from('users')
                    .select('id')
                    .eq('email', username)
                    .limit(1);

                if (existing && existing.length > 0) {
                    throw new Error('Username already taken');
                }

                // Insert new user
                const { data: newUser, error } = await supabase
                    .from('users')
                    .insert([{
                        email: username,
                        password_hash: password,
                        full_name: username
                    }])
                    .select()
                    .single();

                if (error) throw error;

                successDiv.textContent = 'Account created! Redirecting...';
                successDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    currentUser = {
                        id: newUser.id,
                        username: newUser.email,
                        full_name: newUser.full_name
                    };
                    localStorage.setItem('quizrr_user', JSON.stringify(currentUser));
                    document.getElementById('usernameDisplay').textContent = currentUser.username;
                    showDashboard();
                    loadUserAttempts();
                }, 1500);
            } catch (error) {
                console.error('Registration error:', error);
                errorDiv.textContent = error.message || 'Registration failed';
                errorDiv.classList.remove('hidden');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        }

        function handleLogout() {
            localStorage.removeItem('quizrr_user');
            currentUser = null;
            showAuthScreen();
            showLoginForm();
        }

        async function loadUserAttempts() {
            const contentDiv = document.getElementById('dashboardContent');
            
            try {
                const { data: attempts, error } = await supabase
                    .from('user_test_attempts')
                    .select(`
                        *,
                        tests (
                            name,
                            test_date
                        )
                    `)
                    .eq('user_id', currentUser.id)
                    .order('attempted_at', { ascending: false });

                if (error) throw error;

                if (!attempts || attempts.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="loading">
                            <p>No test attempts found.</p>
                            <p style="margin-top: 12px; color: var(--text-muted);">Contact admin to add your test results!</p>
                        </div>
                    `;
                    return;
                }

                renderDashboard(attempts);
            } catch (error) {
                console.error('Load attempts error:', error);
                contentDiv.innerHTML = `
                    <div class="loading">
                        <p style="color: var(--accent-red);">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        function renderDashboard(attempts) {
            const contentDiv = document.getElementById('dashboardContent');
            
            const totalAttempts = attempts.length;
            const avgScore = (attempts.reduce((sum, a) => sum + a.total_score, 0) / totalAttempts / 300 * 100).toFixed(0);
            const avgCorrect = (attempts.reduce((sum, a) => sum + a.attempted_correct, 0) / totalAttempts / 75 * 100).toFixed(0);
            const avgWrong = (attempts.reduce((sum, a) => sum + a.attempted_wrong, 0) / totalAttempts / 75 * 100).toFixed(0);
            const avgNotAttempted = (attempts.reduce((sum, a) => sum + a.not_attempted, 0) / totalAttempts / 75 * 100).toFixed(0);
            const avgNotVisited = (attempts.reduce((sum, a) => sum + a.not_visited, 0) / totalAttempts / 75 * 100).toFixed(0);

            contentDiv.innerHTML = `
                <h1 style="font-size: 36px; font-weight: 700; margin-bottom: 32px;">Performance Dashboard</h1>

                <div class="performance-card">
                    <h3 class="section-title">Summary (${totalAttempts} tests)</h3>
                    
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-label">Average Score</div>
                            <div class="summary-value" style="color: #f59e0b;">${avgScore}%</div>
                            <div class="summary-bar">
                                <div class="summary-bar-fill" style="width: ${avgScore}%; background: linear-gradient(90deg, #f59e0b, #fbbf24);"></div>
                            </div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Correct</div>
                            <div class="summary-value" style="color: #10b981;">${avgCorrect}%</div>
                            <div class="summary-bar">
                                <div class="summary-bar-fill" style="width: ${avgCorrect}%; background: linear-gradient(90deg, #10b981, #34d399);"></div>
                            </div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Wrong</div>
                            <div class="summary-value" style="color: #ef4444;">${avgWrong}%</div>
                            <div class="summary-bar">
                                <div class="summary-bar-fill" style="width: ${avgWrong}%; background: linear-gradient(90deg, #ef4444, #f87171);"></div>
                            </div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Not Attempted</div>
                            <div class="summary-value" style="color: #6366f1;">${avgNotAttempted}%</div>
                            <div class="summary-bar">
                                <div class="summary-bar-fill" style="width: ${avgNotAttempted}%; background: linear-gradient(90deg, #6366f1, #818cf8);"></div>
                            </div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Not Visited</div>
                            <div class="summary-value" style="color: #64748b;">${avgNotVisited}%</div>
                            <div class="summary-bar">
                                <div class="summary-bar-fill" style="width: ${avgNotVisited}%; background: linear-gradient(90deg, #64748b, #94a3b8);"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 32px;">
                    <h3 class="section-title">Test-wise Breakdown</h3>
                    <div class="test-table">
                        <div class="table-header">
                            <div>Test Title</div>
                            <div>Total Score</div>
                            <div>Correct</div>
                            <div>Wrong</div>
                            <div>Not Attempted</div>
                            <div>Not Visited</div>
                        </div>
                        ${attempts.map(attempt => `
                            <div class="table-row">
                                <div>
                                    <div class="test-name">${attempt.tests?.name || 'Test'}</div>
                                    <div class="test-date">${new Date(attempt.attempted_at).toLocaleDateString()}</div>
                                </div>
                                <div class="stat-value" style="color: #f59e0b;">
                                    ${attempt.total_score}<span class="stat-max">/ 300</span>
                                    <div class="stat-bar" style="--color: #f59e0b; height: ${attempt.total_score / 300 * 80}px;"></div>
                                </div>
                                <div class="stat-value" style="color: #10b981;">
                                    ${attempt.attempted_correct}<span class="stat-max">/ 75</span>
                                    <div class="stat-bar" style="--color: #10b981; height: ${attempt.attempted_correct / 75 * 80}px;"></div>
                                </div>
                                <div class="stat-value" style="color: #ef4444;">
                                    ${attempt.attempted_wrong}<span class="stat-max">/ 75</span>
                                    <div class="stat-bar" style="--color: #ef4444; height: ${attempt.attempted_wrong / 75 * 80}px;"></div>
                                </div>
                                <div class="stat-value" style="color: #6366f1;">
                                    ${attempt.not_attempted}<span class="stat-max">/ 75</span>
                                    <div class="stat-bar" style="--color: #6366f1; height: ${attempt.not_attempted / 75 * 80}px;"></div>
                                </div>
                                <div class="stat-value" style="color: #64748b;">
                                    ${attempt.not_visited}<span class="stat-max">/ 75</span>
                                    <div class="stat-bar" style="--color: #64748b; height: ${attempt.not_visited / 75 * 80}px;"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
